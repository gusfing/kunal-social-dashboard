<!DOCTYPE html>
<html>
<head>
<title>3D Office</title>
<meta charset="UTF-8">
<style>body{margin:0;overflow:hidden;background:#000}canvas{display:block}</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="m"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1e3),renderer=new THREE.WebGLRenderer({antialias:true,canvas:document.getElementById('c')});
renderer.setSize(innerWidth,innerHeight);
camera.position.set(0,2,5);
scene.background=new THREE.Color(16776960);
scene.add(new THREE.AmbientLight(4210750,.6));
var sun=new THREE.DirectionalLight(16777215,.8);sun.position.set(50,100,50);scene.add(sun);
var floor=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshLambertMaterial({color:8421504}));floor.rotation.x=-Math.PI/2;scene.add(floor);
var player={x:0,y:2,z:0,vy:0,speed:.2,jump:true},keys={},locked=false;
addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Enter')document.getElementById('ci').focus()});
addEventListener('keyup',e=>{keys[e.code]=false});
addEventListener('click',()=>{if(document.activeElement.tagName!=='INPUT')renderer.domElement.requestPointerLock()});
addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===renderer.domElement});
addEventListener('mousemove',e=>{if(locked){camera.rotation.y-=e.movementX*.003;camera.rotation.x-=e.movementY*.003}});
function box(x,y,z,w,h,d,c){var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:c}));m.position.set(x,y,z);scene.add(m);return m}
box(0,3,-15,30,6,.3,11184690);box(-15,3,0,.3,6,30,11184690);box(15,3,0,.3,6,30,11184690);box(0,6.15,0,30,.3,30,6626211);
box(0,.6,0,2,.8,1,9320663);box(0,1.1,0,.6,.4,.05,0);
box(-1.5,.35,3,.5,.5,.5,3355443);box(0,.35,3,.5,.5,.5,3355443);box(1.5,.35,3,.5,.5,.5,3355443);
for(var i=0;i<4;i++){box(-12+i*3,.4,-12,.6,.5,.6,9320663);box(-12+i*3,1,-12,.8,.8,.8,2194816)}
box(30,2.5,-25,15,5,.3,11184690);box(22.5,2.5,-17.5,.3,5,15,11184690);box(37.5,2.5,-17.5,.3,5,15,11184690);box(30,5.15,-17.5,15,.3,15,6626211);box(30,.6,-20,6,.8,2,1948544);
box(-30,2.5,-25,15,5,.3,11184690);box(-22.5,2.5,-17.5,.3,5,15,11184690);box(-37.5,2.5,-17.5,.3,5,15,11184690);box(-30,.6,-20,4,.8,1.5,4776700);box(-30,2,-17,3,1.5,.1,0);
box(0,2,-40,10,4,.3,11184690);box(-5,2,-34.5,.3,4,10,11184690);box(5,2,-34.5,.3,4,10,11184690);box(0,4.15,-34.5,10,.3,10,6626211);
for(var i=-2;i<=2;i++)box(i*2.5,1.5,-40,1,3,1,3355443);
var npcs=[];
function npc(x,z,c){var g=new THREE.Group();g.add(new THREE.Mesh(new THREE.BoxGeometry(.5,1,.3),new THREE.MeshLambertMaterial({color:c})));g.add(new THREE.Mesh(new THREE.SphereGeometry(.25),new THREE.MeshLambertMaterial({color:16769376})));g.position.set(x,0,z);g.userData={tx:x,tz:z};scene.add(g);npcs.push(g)}
npc(5,5,7745350);npc(-5,5,2411478);npc(0,8,14204713);
var sky=new THREE.Mesh(new THREE.SphereGeometry(300,32,32),new THREE.MeshBasicMaterial({color:11184690,side:2}));scene.add(sky);
var mc=document.getElementById('m').getContext('2d');
function miniMap(){mc.fillStyle='#1a1a2e';mc.fillRect(0,0,150,100);mc.fillStyle='#333';mc.fillRect(60,30,30,40);mc.fillStyle='#4ade80';mc.beginPath();mc.arc(75+player.x*.5,50+player.z*.5,4,0,6.28);mc.fill()}
function chat(t,s){var d=document.createElement('div');d.className='m '+s;d.textContent=(s==='s'?'You: ':'')+t;document.getElementById('ml').appendChild(d)}
document.getElementById('cb').onclick=function(){var i=document.getElementById('ci'),v=i.value.trim();if(v)chat(v,'s'),i.value=''};
addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.tagName!=='INPUT')document.getElementById('cb').click()});
function tp(n,v){player.x=n.x;player.z=n.z+5;document.querySelectorAll('.r').forEach(b=>b.classList.remove('a'));v.classList.add('a');document.getElementById('h').textContent='🏢 '+v.textContent.replace(/[^\w\s]/g,'').trim();chat('Joined '+v.textContent.replace(/[^\w\s]/g,'').trim(),'c')}
var rooms={m:{x:0,z:0},e:{x:30,z:-20},l:{x:-30,z:-20},s:{x:0,z:-35}};
document.querySelectorAll('.r').forEach(b=>{b.onclick=function(){tp(rooms[b.dataset.r],this)}});
function loop(){requestAnimationFrame(loop);if(locked){var d=new THREE.Vector3();if(keys.KeyW)d.z-=1;if(keys.KeyS)d.z+=1;if(keys.KeyA)d.x-=1;if(keys.KeyD)d.x+=1;d.normalize().applyAxisAngle(new THREE.Vector3(0,1,0),camera.rotation.y);player.x+=d.x*player.speed;player.z+=d.z*player.speed;player.x=Math.max(-50,Math.min(50,player.x));player.z=Math.max(-50,Math.min(50,player.z));if(keys.Space&&player.jump)player.vy=.3,player.jump=false}player.vy-=.015;player.y+=player.vy;if(player.y<=2)player.y=2,player.vy=0,player.jump=true;camera.position.set(player.x,player.y,player.z);npcs.forEach((n,i)=>{n.userData.tx+=Math.sin(Date.now()*.002+i)*.02;n.userData.tz+=Math.cos(Date.now()*.002+i)*.02;n.position.x+=(n.userData.tx-n.position.x)*.02;n.position.z+=(n.userData.tz-n.position.z)*.02;n.rotation.y=Math.atan2(n.userData.tx-n.position.x,n.userData.tz-n.position.z)});miniMap();renderer.render(scene,camera)}loop();onresize=function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)}
</script>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;overflow:hidden}
#h{position:fixed;top:20px;left:20px;background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:8px;font-size:1.2rem;z-index:100}
.r{position:fixed;top:80px;left:20px;z-index:100}
.r button{display:block;width:150px;padding:10px;margin:5px 0;background:rgba(0,0,0,.7);border:1px solid #333;color:#fff;border-radius:6px;cursor:pointer}
.r button:hover,.r button.a{background:#4ade80;color:#000}
.c{position:fixed;bottom:20px;left:20px;background:rgba(0,0,0,.8);color:#fff;padding:15px;border-radius:8px;z-index:100;font-size:.9rem}
.c h3{color:#4ade80;margin-bottom:10px}
.c kbd{background:#333;padding:2px 8px;border-radius:4px;margin:0 3px}
#m{position:fixed;top:20px;right:20px;width:150px;height:100px;background:rgba(0,0,0,.8);border:2px solid #4ade80;border-radius:8px;z-index:100}
#ch{position:fixed;bottom:20px;right:20px;width:280px;background:rgba(0,0,0,.9);border-radius:12px;z-index:100}
#ch .h{padding:12px;background:#1a1a2e;border-radius:12px 12px 0 0;color:#fff;font-weight:bold}
#ml{padding:12px;max-height:200px;overflow-y:auto}
.m{padding:8px 12px;border-radius:8px;margin-bottom:8px;font-size:.85rem}
.m.s{background:#4ade80;color:#000;margin-left:20px}
.m.o{background:#333;color:#fff;margin-right:20px}
.m.c{background:#fbbf24;color:#000;text-align:center;font-size:.75rem}
#ci{padding:12px;border-top:1px solid #333;display:flex;gap:8px}
#ci input{flex:1;padding:8px;border:none;border-radius:6px;background:#333;color:#fff}
#ci button{padding:8px 16px;background:#4ade80;border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer}
</style>
<div id="h" class="h">🏢 Main Hall</div>
<div class="r">
<button class="a" data-r="m">🏢 Main Hall</button>
<button data-r="e">📋 Meeting Room</button>
<button data-r="l">🛋️ Lounge</button>
<button data-r="s">🖥️ Server Room</button>
</div>
<div class="c">
<h3>🎮 Controls</h3>
<p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</p>
<p><kbd>Mouse</kbd> Look</p>
<p><kbd>Space</kbd> Jump</p>
<p><kbd>Enter</kbd> Chat</p>
</div>
<div id="ch"><div class="h">💬 Team Chat</div><div id="ml"><div class="m c">Welcome to 3D Office!</div></div><div id="ci"><input id="ci" placeholder="Type..."><button id="cb">Send</button></div></div>
</body>
</html>
