<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunal's Queue</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #667eea; }
        .refresh { background: #333; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 10px; }
        .refresh:hover { background: #444; }
        .queue-item { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .qi-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .qi-platform { font-size: 0.75rem; padding: 4px 8px; background: #667eea; border-radius: 4px; }
        .qi-account { font-size: 0.75rem; padding: 4px 8px; background: #444; border-radius: 4px; color: #aaa; }
        .qi-time { font-size: 0.75rem; color: #888; }
        .qi-content { font-size: 0.9rem; color: #ccc; margin: 8px 0; line-height: 1.5; }
        .qi-images { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .qi-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; }
        .qi-status { display: inline-block; font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; margin-top: 8px; }
        .qi-status.pending { background: #fbbf24; color: #000; }
        .qi-status.scheduled { background: #3b82f6; color: #fff; }
        .qi-status.posted { background: #4ade80; color: #000; }
        .empty { text-align: center; padding: 40px; color: #666; }
        .info { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-top: 20px; }
        .info h3 { font-size: 0.9rem; color: #888; margin-bottom: 8px; }
        .info p { font-size: 0.85rem; color: #666; line-height: 1.5; }
        .note { font-size: 0.75rem; color: #555; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Post Queue <button class="refresh" onclick="loadQueue()">↻</button></h1>
        </header>
        
        <div id="queue-list">
            <div class="empty">Loading...</div>
        </div>
        
        <div class="info">
            <h3>How to add posts:</h3>
            <p>Send me posts on Telegram with:<br>
            - What to post<br>
            - Which platform (X, Instagram, Reddit, LinkedIn)<br>
            - Which account<br>
            - Images if needed</p>
        </div>
        
        <div class="note">
            I check the queue every few minutes<br>
            or just message me directly!
        </div>
    </div>
    
    <script>
        const GIST_RAW_URL = 'https://gist.githubusercontent.com/gusfing/ad437d0ac4f6ea8aa953c6cbdf1c66a7/raw/a6244df4de89e5fde4ee12f1cedee86ed21d4dfc/queue.json';
        
        async function loadQueue() {
            try {
                const res = await fetch(GIST_RAW_URL + '?t=' + Date.now());
                const data = await res.json();
                renderQueue(data);
            } catch (e) {
                document.getElementById('queue-list').innerHTML = '<div class="empty">Error loading queue</div>';
            }
        }
        
        function renderQueue(data) {
            const posts = data.posts || [];
            const list = document.getElementById('queue-list');
            
            if (posts.length === 0) {
                list.innerHTML = '<div class="empty">No posts in queue 🎉<br><br>Send me a post on Telegram!</div>';
                return;
            }
            
            const platformIcons = { x: '𝕏', instagram: '📸', reddit: '🤖', linkedin: '💼' };
            const accountNames = {
                acct1: '@Kunalsharmadec6',
                acct2: '@richbutruined',
                linkedin1: 'fatmahifza1',
                linkedin2: 'thepixzastudio'
            };
            
            list.innerHTML = posts.map(post => {
                const time = post.scheduledAt 
                    ? new Date(post.scheduledAt).toLocaleString()
                    : new Date(post.createdAt).toLocaleString();
                
                const images = (post.images || []).map(img => 
                    `<img src="${img}" alt="Image" onerror="this.style.display='none'">`
                ).join('');
                
                return `
                    <div class="queue-item">
                        <div class="qi-header">
                            <span class="qi-platform">${platformIcons[post.platform] || post.platform} ${post.platform}</span>
                            <span class="qi-account">${accountNames[post.account] || post.account}</span>
                        </div>
                        <div class="qi-time">📅 ${time}</div>
                        <div class="qi-content">${post.text || '[Image only]'}</div>
                        ${images ? `<div class="qi-images">${images}</div>` : ''}
                        <div class="qi-status ${post.status}">${post.status}</div>
                    </div>
                `;
            }).join('');
        }
        
        // Load on start
        loadQueue();
        
        // Refresh every 30 seconds
        setInterval(loadQueue, 30000);
    </script>
</body>
</html>
