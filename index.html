<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunal's Social Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #333; margin-bottom: 30px; }
        header h1 { font-size: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #888; margin-top: 10px; }
        .status-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .status-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .status-card h3 { font-size: 0.875rem; color: #888; margin-bottom: 8px; }
        .status-card .value { font-size: 1.5rem; font-weight: 600; }
        .status-card .ready { color: #4ade80; }
        .status-card .pending { color: #fbbf24; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab { padding: 12px 24px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab:hover { background: #252525; }
        .tab.active { background: #667eea; border-color: #667eea; }
        .platform-section { display: none; }
        .platform-section.active { display: block; }
        .composer { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .composer h2 { margin-bottom: 16px; font-size: 1.1rem; }
        .textarea-wrap { position: relative; margin-bottom: 16px; }
        textarea { width: 100%; min-height: 120px; background: #252525; border: 1px solid #333; border-radius: 8px; padding: 16px; color: #fff; font-size: 1rem; resize: vertical; font-family: inherit; }
        textarea:focus { outline: none; border-color: #667eea; }
        .image-upload { margin-bottom: 16px; }
        .image-upload label { display: block; padding: 20px; background: #252525; border: 2px dashed #444; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .image-upload label:hover { border-color: #667eea; }
        .image-upload input { display: none; }
        .image-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .preview-item { position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: #fff; cursor: pointer; font-size: 12px; }
        .post-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .post-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4); }
        .queue-section { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; }
        .queue-section h2 { margin-bottom: 16px; font-size: 1.1rem; }
        .queue-item { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .queue-item .qi-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .queue-item .qi-platform { font-size: 0.75rem; padding: 4px 8px; background: #333; border-radius: 4px; }
        .queue-item .qi-status { font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; }
        .queue-item .qi-status.pending { background: #fbbf24; color: #000; }
        .queue-item .qi-status.posted { background: #4ade80; color: #000; }
        .queue-item .qi-status.failed { background: #f87171; color: #fff; }
        .queue-item .qi-content { font-size: 0.9rem; color: #ccc; margin: 8px 0; }
        .empty-queue { text-align: center; padding: 40px; color: #666; }
        .notification { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; background: #1a1a1a; border: 1px solid #667eea; border-radius: 8px; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
        .notification.show { transform: translateY(0); opacity: 1; }
        .notification.success { border-color: #4ade80; }
        .notification.error { border-color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kunal's Social Dashboard</h1>
            <p>Posts go to a queue - I'll process them automatically</p>
        </header>
        
        <div class="status-bar">
            <div class="status-card">
                <h3>Queue Status</h3>
                <div class="value ready" id="queue-status">Ready</div>
                <div class="sub" id="queue-count">0 posts in queue</div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-platform="x">X.com</div>
            <div class="tab" data-platform="instagram">Instagram</div>
            <div class="tab" data-platform="pinterest">Pinterest</div>
        </div>
        
        <div class="platform-section active" id="x-section">
            <div class="composer">
                <h2>Compose X Post</h2>
                <div class="textarea-wrap">
                    <textarea id="x-text" placeholder="What's happening?" maxlength="280"></textarea>
                </div>
                <div class="image-upload">
                    <label><span>Add Images (up to 4)</span><input type="file" id="x-images" accept="image/*" multiple></label>
                    <div class="image-preview" id="x-preview"></div>
                </div>
                <button class="post-btn" onclick="postNow('x')">Add to Queue</button>
            </div>
        </div>
        
        <div class="platform-section" id="instagram-section">
            <div class="composer">
                <h2>Compose Instagram Post</h2>
                <div class="textarea-wrap">
                    <textarea id="ig-text" placeholder="Write a caption..."></textarea>
                </div>
                <div class="image-upload">
                    <label><span>Add Image</span><input type="file" id="ig-images" accept="image/*"></label>
                    <div class="image-preview" id="ig-preview"></div>
                </div>
                <button class="post-btn" onclick="postNow('instagram')">Add to Queue</button>
            </div>
        </div>
        
        <div class="platform-section" id="pinterest-section">
            <div class="composer">
                <h2>Compose Pinterest Pin</h2>
                <div class="textarea-wrap">
                    <textarea id="pinterest-text" placeholder="Pin title and description..."></textarea>
                </div>
                <div class="image-upload">
                    <label><span>Add Pin Image</span><input type="file" id="pinterest-images" accept="image/*"></label>
                    <div class="image-preview" id="pinterest-preview"></div>
                </div>
                <button class="post-btn" onclick="postNow('pinterest')">Add to Queue</button>
            </div>
        </div>
        
        <div class="queue-section">
            <h2>Post Queue</h2>
            <div id="queue-list">
                <div class="empty-queue">No posts in queue</div>
            </div>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>
    
    <script>
        const API = '/api/post';
        let currentPlatform = 'x';
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.platform-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.platform}-section`).classList.add('active');
                currentPlatform = tab.dataset.platform;
            });
        });
        
        // Image preview
        ['x-images', 'ig-images', 'pinterest-images'].forEach(inputId => {
            document.getElementById(inputId).addEventListener('change', (e) => {
                const preview = document.getElementById(inputId.replace('-images', '-preview'));
                preview.innerHTML = '';
                const max = inputId === 'x-images' ? 4 : 1;
                Array.from(e.target.files).slice(0, max).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = 'preview-item';
                        div.innerHTML = `<img src="${e.target.result}" alt="Preview"><button class="remove" onclick="this.parentElement.remove()">×</button>`;
                        preview.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            });
        });
        
        // Post now
        async function postNow(platform) {
            const text = document.getElementById(`${platform}-text`).value.trim();
            const preview = document.getElementById(`${platform}-images`).closest('.image-upload').querySelector('.image-preview');
            const images = [];
            preview.querySelectorAll('img').forEach(img => images.push(img.src));
            
            if (!text && images.length === 0) {
                showNotification('Please add text or images', 'error');
                return;
            }
            
            const btn = document.querySelector(`#${platform}-section .post-btn`);
            btn.disabled = true;
            btn.textContent = 'Adding...';
            
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ platform, text, images })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showNotification('Post added to queue!', 'success');
                    document.getElementById(`${platform}-text`).value = '';
                    preview.innerHTML = '';
                    loadQueue();
                } else {
                    showNotification(data.error || 'Failed to add post', 'error');
                }
            } catch (e) {
                showNotification('Error: ' + e.message, 'error');
            }
            
            btn.disabled = false;
            btn.textContent = 'Add to Queue';
        }
        
        // Load queue
        async function loadQueue() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                
                const posts = data.posts || [];
                document.getElementById('queue-count').textContent = `${posts.length} posts in queue`;
                
                const list = document.getElementById('queue-list');
                if (posts.length === 0) {
                    list.innerHTML = '<div class="empty-queue">No posts in queue</div>';
                    return;
                }
                
                const platformIcons = { x: 'X', instagram: 'IG', pinterest: 'P' };
                list.innerHTML = posts.map(post => `
                    <div class="queue-item">
                        <div class="qi-header">
                            <span class="qi-platform">${platformIcons[post.platform]} ${post.platform}</span>
                            <span class="qi-status ${post.status}">${post.status}</span>
                        </div>
                        <div class="qi-content">${post.text || '[Image only]'}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load queue:', e);
            }
        }
        
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type} show`;
            setTimeout(() => notif.classList.remove('show'), 3000);
        }
        
        // Init
        loadQueue();
        setInterval(loadQueue, 10000); // Refresh every 10 seconds
    </script>
</body>
</html>
